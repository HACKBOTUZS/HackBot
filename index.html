<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI BASHORATCHI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Share Tech Mono", monospace;
      text-shadow: 0 0 3px rgba(57, 255, 20, 0.4);
      background-color: #000;
      overflow-x: hidden;
      color: rgb(74 222 128 / 1);
    }
    .cursor::after {
      content: "_";
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    .hacker-input:focus {
      box-shadow: 0 0 15px rgba(57, 255, 20, 0.6);
    }
    .blinking-red {
      color: #ef4444;
      animation: blink-red 1.5s step-end infinite;
    }
    @keyframes blink-red {
      50% { opacity: 0.5; }
    }
    .shake {
      animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }
    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }
    .signal-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .signal-card:hover:not(.locked-card) {
      transform: translateY(-5px);
      box-shadow: 0 0 25px rgba(57, 255, 20, 0.5);
    }
    #chat-widget {
      transition: all 0.3s ease-in-out;
    }
    #chat-messages::-webkit-scrollbar {
      width: 4px;
    }
    #chat-messages::-webkit-scrollbar-track {
      background: #1a1a1a;
    }
    #chat-messages::-webkit-scrollbar-thumb {
      background: #00ff00;
    }
    #live-feed-container {
      mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
    }
    .winner-item {
      animation: slideInFromLeft 0.5s ease-out forwards;
      gap: 10px;
    }
    @keyframes slideInFromLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .btn-disabled {
      background-color: #4a5568;
      cursor: not-allowed;
      color: #a0aec0;
    }
    .multiplier-rising {
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
      color: #63b3ed;
    }
    .multiplier-final {
      color: #48bb78;
      text-shadow: 0 0 20px rgba(72, 187, 120, 0.8);
    }
    .custom-select-options {
      animation: fadeIn 0.2s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .mine-cell {
      background-color: #1a202c;
      border-radius: 0.375rem;
      transition: all 0.3s ease-in-out;
      cursor: default;
    }
    .mine-cell.safe {
      background-image: url(https://www.freeiconspng.com/uploads/yellow-christmas-star-png-18.png);
      background-size: 70%;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #38a169;
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(56, 161, 105, 0.7);
    }
    .game-console {
      background-color: #0d1117;
      border-color: #30363d;
      height: 8rem;
    }
    .game-console p {
      animation: fadeInConsole 0.3s ease-in;
      color: #a5d6ff;
    }
    .game-console p.success { color: #56d364; }
    .game-console p.error { color: #f85149; }
    @keyframes fadeInConsole {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .penalty-gate-post { background-color: #a0aec0; }
